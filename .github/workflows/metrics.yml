name: Generate GitHub Metrics

on:
  schedule:
    - cron: "0 2 * * *" # Runs daily at 02:00 UTC
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: metrics
  cancel-in-progress: false

jobs:
  check-secret:
    runs-on: ubuntu-latest
    outputs:
      has_token: ${{ steps.check.outputs.has_token }}
    steps:
      - id: check
        env:
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          if [ -n "$METRICS_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::warning::METRICS_TOKEN secret is not set — skipping metrics generation. Create a PAT with scopes: repo, read:org, read:user, read:packages and add it as METRICS_TOKEN in repo Settings → Secrets."
          fi

  github-metrics:
    needs: check-secret
    if: needs.check-secret.outputs.has_token == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Generate Metrics
        uses: lowlighter/metrics@v4
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: jhm1909
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Seoul

          # Lines of code
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_sections: base

          # Coding habits
          plugin_habits: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200

          # Languages
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

          # Achievements
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C

          # Isometric calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          filename: github-metrics.svg
