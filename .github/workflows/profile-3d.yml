name: Generate 3D Contribution Graph

on:
  schedule:
    - cron: "0 6 * * *" # Runs daily at 06:00 UTC (avoid race with snake/metrics)
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: profile-3d
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    name: Generate 3D Profile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate 3D Contribution
        uses: yoshi389111/github-profile-3d-contrib@v0.9.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Keep only used SVG
        run: |
          find profile-3d-contrib -type f -name '*.svg' ! -name 'profile-night-green.svg' -delete

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A profile-3d-contrib/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update 3D contribution graph"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
          echo "Push failed after 3 attempts"
          exit 1
