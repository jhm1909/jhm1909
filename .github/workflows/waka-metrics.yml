name: Generate WakaTime Metrics SVG

on:
  schedule:
    - cron: "0 3 * * *" # Daily at 03:00 UTC (after profile-3d at 06)
  workflow_dispatch:

concurrency:
  group: waka-metrics
  cancel-in-progress: false

jobs:
  waka-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    name: Generate WakaTime SVG via lowlighter/metrics
    steps:
      - name: Generate WakaTime SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_PAT }}
          user: jhm1909
          filename: waka-metrics.svg
          template: classic
          base: ""
          config_timezone: Asia/Seoul

          # WakaTime plugin only
          plugin_wakatime: yes
          plugin_wakatime_days: 7
          plugin_wakatime_limit: 8
          plugin_wakatime_sections: time, projects, languages, editors, os
          plugin_wakatime_token: ${{ secrets.WAKATIME_API_KEY }}
          plugin_wakatime_url: https://wakatime.com
          plugin_wakatime_user: cappy
