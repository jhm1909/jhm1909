<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" width="700" height="200">
    <style>
        @keyframes burst1 {
            0% {
                transform: scale(0);
                opacity: 1;
            }

            50% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(1.3);
                opacity: 0;
            }
        }

        @keyframes burst2 {
            0% {
                transform: scale(0);
                opacity: 1;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(1.4);
                opacity: 0;
            }
        }

        @keyframes burst3 {
            0% {
                transform: scale(0);
                opacity: 1;
            }

            60% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(1.2);
                opacity: 0;
            }
        }

        @keyframes rise {
            0% {
                opacity: 1;
                transform: translateY(0);
            }

            100% {
                opacity: 0;
                transform: translateY(-30px);
            }
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0.3;
            }

            50% {
                opacity: 1;
            }
        }

        .fw1 {
            animation: burst1 2.5s ease-out infinite;
            transform-origin: center;
            transform-box: fill-box;
        }

        .fw2 {
            animation: burst2 3s ease-out 0.8s infinite;
            transform-origin: center;
            transform-box: fill-box;
        }

        .fw3 {
            animation: burst3 2.8s ease-out 1.5s infinite;
            transform-origin: center;
            transform-box: fill-box;
        }

        .fw4 {
            animation: burst1 3.2s ease-out 0.4s infinite;
            transform-origin: center;
            transform-box: fill-box;
        }

        .fw5 {
            animation: burst2 2.6s ease-out 2s infinite;
            transform-origin: center;
            transform-box: fill-box;
        }

        .spark {
            animation: rise 2.5s ease-out infinite;
            transform-box: fill-box;
        }

        .spark2 {
            animation: rise 3s ease-out 0.8s infinite;
            transform-box: fill-box;
        }

        .spark3 {
            animation: rise 2.8s ease-out 1.5s infinite;
            transform-box: fill-box;
        }

        .t1 {
            animation: twinkle 1.5s ease-in-out infinite;
        }

        .t2 {
            animation: twinkle 1.8s ease-in-out 0.3s infinite;
        }

        .t3 {
            animation: twinkle 2s ease-in-out 0.7s infinite;
        }

        .t4 {
            animation: twinkle 1.3s ease-in-out 1s infinite;
        }
    </style>

    <!-- Firework 1 - Cyan/Blue (left) -->
    <g class="fw1" transform="translate(120, 70)">
        <line x1="0" y1="0" x2="0" y2="-25" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" />
        <line x1="0" y1="0" x2="18" y2="-18" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" />
        <line x1="0" y1="0" x2="25" y2="0" stroke="#6366f1" stroke-width="2" stroke-linecap="round" />
        <line x1="0" y1="0" x2="18" y2="18" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" />
        <line x1="0" y1="0" x2="0" y2="25" stroke="#6366f1" stroke-width="2" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-18" y2="18" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-25" y2="0" stroke="#6366f1" stroke-width="2" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-18" y2="-18" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" />
        <circle cx="0" cy="-25" r="2" fill="#00d4ff" />
        <circle cx="18" cy="-18" r="2" fill="#00d4ff" />
        <circle cx="25" cy="0" r="2" fill="#6366f1" />
        <circle cx="18" cy="18" r="2" fill="#00d4ff" />
        <circle cx="-18" cy="-18" r="2" fill="#00d4ff" />
        <circle cx="-25" cy="0" r="2" fill="#6366f1" />
    </g>

    <!-- Firework 2 - Purple/Pink (center-right) -->
    <g class="fw2" transform="translate(450, 50)">
        <line x1="0" y1="0" x2="0" y2="-30" stroke="#bb86fc" stroke-width="2" stroke-linecap="round" />
        <line x1="0" y1="0" x2="21" y2="-21" stroke="#ff6b6b" stroke-width="2" stroke-linecap="round" />
        <line x1="0" y1="0" x2="30" y2="0" stroke="#bb86fc" stroke-width="2" stroke-linecap="round" />
        <line x1="0" y1="0" x2="21" y2="21" stroke="#ff6b6b" stroke-width="2" stroke-linecap="round" />
        <line x1="0" y1="0" x2="0" y2="30" stroke="#bb86fc" stroke-width="2" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-21" y2="21" stroke="#ff6b6b" stroke-width="2" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-30" y2="0" stroke="#bb86fc" stroke-width="2" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-21" y2="-21" stroke="#ff6b6b" stroke-width="2" stroke-linecap="round" />
        <circle cx="0" cy="-30" r="2.5" fill="#bb86fc" />
        <circle cx="21" cy="-21" r="2.5" fill="#ff6b6b" />
        <circle cx="30" cy="0" r="2.5" fill="#bb86fc" />
        <circle cx="-21" cy="-21" r="2.5" fill="#ff6b6b" />
        <circle cx="-30" cy="0" r="2.5" fill="#bb86fc" />
    </g>

    <!-- Firework 3 - Gold/Yellow (right) -->
    <g class="fw3" transform="translate(600, 80)">
        <line x1="0" y1="0" x2="0" y2="-20" stroke="#f1e05a" stroke-width="1.5" stroke-linecap="round" />
        <line x1="0" y1="0" x2="14" y2="-14" stroke="#ffa657" stroke-width="1.5" stroke-linecap="round" />
        <line x1="0" y1="0" x2="20" y2="0" stroke="#f1e05a" stroke-width="1.5" stroke-linecap="round" />
        <line x1="0" y1="0" x2="14" y2="14" stroke="#ffa657" stroke-width="1.5" stroke-linecap="round" />
        <line x1="0" y1="0" x2="0" y2="20" stroke="#f1e05a" stroke-width="1.5" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-14" y2="14" stroke="#ffa657" stroke-width="1.5" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-20" y2="0" stroke="#f1e05a" stroke-width="1.5" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-14" y2="-14" stroke="#ffa657" stroke-width="1.5" stroke-linecap="round" />
        <circle cx="0" cy="-20" r="1.5" fill="#f1e05a" />
        <circle cx="14" cy="-14" r="1.5" fill="#ffa657" />
        <circle cx="-14" cy="-14" r="1.5" fill="#ffa657" />
    </g>

    <!-- Firework 4 - Pink/Magenta (center-left) -->
    <g class="fw4" transform="translate(250, 55)">
        <line x1="0" y1="0" x2="0" y2="-22" stroke="#ff69b4" stroke-width="1.8" stroke-linecap="round" />
        <line x1="0" y1="0" x2="16" y2="-16" stroke="#ff6b6b" stroke-width="1.8" stroke-linecap="round" />
        <line x1="0" y1="0" x2="22" y2="0" stroke="#ff69b4" stroke-width="1.8" stroke-linecap="round" />
        <line x1="0" y1="0" x2="16" y2="16" stroke="#ff6b6b" stroke-width="1.8" stroke-linecap="round" />
        <line x1="0" y1="0" x2="0" y2="22" stroke="#ff69b4" stroke-width="1.8" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-16" y2="16" stroke="#ff6b6b" stroke-width="1.8" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-22" y2="0" stroke="#ff69b4" stroke-width="1.8" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-16" y2="-16" stroke="#ff6b6b" stroke-width="1.8" stroke-linecap="round" />
        <circle cx="0" cy="-22" r="2" fill="#ff69b4" />
        <circle cx="16" cy="-16" r="2" fill="#ff6b6b" />
        <circle cx="22" cy="0" r="2" fill="#ff69b4" />
        <circle cx="-16" cy="-16" r="2" fill="#ff6b6b" />
    </g>

    <!-- Firework 5 - Green/Teal (far left) -->
    <g class="fw5" transform="translate(80, 110)">
        <line x1="0" y1="0" x2="0" y2="-18" stroke="#7ee787" stroke-width="1.5" stroke-linecap="round" />
        <line x1="0" y1="0" x2="13" y2="-13" stroke="#3fb950" stroke-width="1.5" stroke-linecap="round" />
        <line x1="0" y1="0" x2="18" y2="0" stroke="#7ee787" stroke-width="1.5" stroke-linecap="round" />
        <line x1="0" y1="0" x2="13" y2="13" stroke="#3fb950" stroke-width="1.5" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-13" y2="13" stroke="#3fb950" stroke-width="1.5" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-18" y2="0" stroke="#7ee787" stroke-width="1.5" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-13" y2="-13" stroke="#3fb950" stroke-width="1.5" stroke-linecap="round" />
        <circle cx="0" cy="-18" r="1.5" fill="#7ee787" />
        <circle cx="13" cy="-13" r="1.5" fill="#3fb950" />
    </g>

    <!-- Sparks falling -->
    <g class="spark">
        <circle cx="130" cy="95" r="1" fill="#00d4ff" opacity="0.8" />
        <circle cx="110" cy="90" r="1" fill="#6366f1" opacity="0.6" />
        <circle cx="140" cy="88" r="0.8" fill="#00d4ff" opacity="0.7" />
    </g>
    <g class="spark2">
        <circle cx="440" cy="78" r="1.2" fill="#bb86fc" opacity="0.8" />
        <circle cx="460" cy="75" r="1" fill="#ff6b6b" opacity="0.6" />
        <circle cx="435" cy="82" r="0.8" fill="#bb86fc" opacity="0.7" />
    </g>
    <g class="spark3">
        <circle cx="245" cy="76" r="1" fill="#ff69b4" opacity="0.8" />
        <circle cx="260" cy="72" r="0.8" fill="#ff6b6b" opacity="0.6" />
    </g>

    <!-- Twinkling stars -->
    <circle cx="350" cy="30" r="1.5" fill="#fff" class="t1" />
    <circle cx="180" cy="140" r="1.2" fill="#fff" class="t2" />
    <circle cx="520" cy="130" r="1.5" fill="#fff" class="t3" />
    <circle cx="650" cy="40" r="1" fill="#fff" class="t4" />
    <circle cx="50" cy="50" r="1" fill="#fff" class="t1" />
    <circle cx="300" cy="150" r="1.3" fill="#fff" class="t2" />
    <circle cx="580" cy="160" r="1" fill="#fff" class="t3" />
    <circle cx="400" cy="170" r="1.2" fill="#fff" class="t4" />
    <circle cx="150" cy="25" r="1" fill="#fff" class="t1" />
    <circle cx="500" cy="20" r="1.2" fill="#fff" class="t3" />
</svg>