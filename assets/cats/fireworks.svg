<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 180" width="700" height="180">
    <defs>
        <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.6" />
            <stop offset="100%" stop-color="#00d4ff" stop-opacity="0" />
        </radialGradient>
        <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#bb86fc" stop-opacity="0.6" />
            <stop offset="100%" stop-color="#bb86fc" stop-opacity="0" />
        </radialGradient>
        <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ff6b6b" stop-opacity="0.5" />
            <stop offset="100%" stop-color="#ff6b6b" stop-opacity="0" />
        </radialGradient>
        <radialGradient id="glow4" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#f1e05a" stop-opacity="0.5" />
            <stop offset="100%" stop-color="#f1e05a" stop-opacity="0" />
        </radialGradient>
        <radialGradient id="glow5" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#7ee787" stop-opacity="0.5" />
            <stop offset="100%" stop-color="#7ee787" stop-opacity="0" />
        </radialGradient>
    </defs>
    <style>
        @keyframes explode {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        @keyframes trail {
            0% {
                stroke-dashoffset: 30;
                opacity: 0;
            }

            20% {
                opacity: 1;
            }

            60% {
                stroke-dashoffset: 0;
                opacity: 0.8;
            }

            100% {
                stroke-dashoffset: 0;
                opacity: 0;
            }
        }

        @keyframes shimmer {

            0%,
            100% {
                opacity: 0;
                transform: scale(0.5);
            }

            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        @keyframes drip {
            0% {
                transform: translateY(0);
                opacity: 1;
            }

            100% {
                transform: translateY(40px);
                opacity: 0;
            }
        }

        @keyframes launch {
            0% {
                transform: translateY(60px);
                opacity: 1;
            }

            80% {
                opacity: 1;
            }

            100% {
                transform: translateY(0);
                opacity: 0;
            }
        }

        .e1 {
            animation: explode 3s ease-out infinite;
            transform-origin: center;
            transform-box: fill-box;
        }

        .e2 {
            animation: explode 3.5s ease-out 1s infinite;
            transform-origin: center;
            transform-box: fill-box;
        }

        .e3 {
            animation: explode 2.8s ease-out 1.8s infinite;
            transform-origin: center;
            transform-box: fill-box;
        }

        .e4 {
            animation: explode 3.2s ease-out 0.5s infinite;
            transform-origin: center;
            transform-box: fill-box;
        }

        .e5 {
            animation: explode 3s ease-out 2.3s infinite;
            transform-origin: center;
            transform-box: fill-box;
        }

        .tr1 {
            stroke-dasharray: 30;
            animation: trail 3s ease-out infinite;
        }

        .tr2 {
            stroke-dasharray: 30;
            animation: trail 3.5s ease-out 1s infinite;
        }

        .tr3 {
            stroke-dasharray: 30;
            animation: trail 2.8s ease-out 1.8s infinite;
        }

        .tr4 {
            stroke-dasharray: 30;
            animation: trail 3.2s ease-out 0.5s infinite;
        }

        .tr5 {
            stroke-dasharray: 30;
            animation: trail 3s ease-out 2.3s infinite;
        }

        .d1 {
            animation: drip 3s ease-in 1.2s infinite;
            transform-box: fill-box;
        }

        .d2 {
            animation: drip 3.5s ease-in 2.2s infinite;
            transform-box: fill-box;
        }

        .d3 {
            animation: drip 2.8s ease-in 2.8s infinite;
            transform-box: fill-box;
        }

        .d4 {
            animation: drip 3.2s ease-in 1.6s infinite;
            transform-box: fill-box;
        }

        .l1 {
            animation: launch 1.2s ease-out infinite;
            transform-box: fill-box;
        }

        .l2 {
            animation: launch 1.5s ease-out 1s infinite;
            transform-box: fill-box;
        }

        .l3 {
            animation: launch 1s ease-out 1.8s infinite;
            transform-box: fill-box;
        }

        .l4 {
            animation: launch 1.3s ease-out 0.5s infinite;
            transform-box: fill-box;
        }

        .l5 {
            animation: launch 1.1s ease-out 2.3s infinite;
            transform-box: fill-box;
        }

        .s1 {
            animation: shimmer 2s ease-in-out infinite;
        }

        .s2 {
            animation: shimmer 2.5s ease-in-out 0.4s infinite;
        }

        .s3 {
            animation: shimmer 1.8s ease-in-out 0.8s infinite;
        }

        .s4 {
            animation: shimmer 2.2s ease-in-out 1.2s infinite;
        }

        .s5 {
            animation: shimmer 1.6s ease-in-out 1.6s infinite;
        }

        .s6 {
            animation: shimmer 2.4s ease-in-out 0.2s infinite;
        }

        .s7 {
            animation: shimmer 1.9s ease-in-out 1s infinite;
        }
    </style>

    <!-- Launch trails -->
    <line x1="130" y1="170" x2="130" y2="60" class="tr1" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" />
    <line x1="350" y1="170" x2="350" y2="45" class="tr2" stroke="#bb86fc" stroke-width="1.5" stroke-linecap="round" />
    <line x1="550" y1="170" x2="550" y2="55" class="tr3" stroke="#f1e05a" stroke-width="1.5" stroke-linecap="round" />
    <line x1="250" y1="170" x2="250" y2="70" class="tr4" stroke="#ff6b6b" stroke-width="1.5" stroke-linecap="round" />
    <line x1="480" y1="170" x2="480" y2="85" class="tr5" stroke="#7ee787" stroke-width="1.5" stroke-linecap="round" />

    <!-- Glow backgrounds -->
    <circle cx="130" cy="60" r="40" fill="url(#glow1)" class="e1" />
    <circle cx="350" cy="45" r="50" fill="url(#glow2)" class="e2" />
    <circle cx="550" cy="55" r="35" fill="url(#glow4)" class="e3" />
    <circle cx="250" cy="70" r="38" fill="url(#glow3)" class="e4" />
    <circle cx="480" cy="85" r="32" fill="url(#glow5)" class="e5" />

    <!-- Firework 1 - Cyan chrysanthemum -->
    <g class="e1" transform="translate(130, 60)">
        <line x1="0" y1="0" x2="0" y2="-28" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round" />
        <line x1="0" y1="0" x2="14" y2="-24" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" />
        <line x1="0" y1="0" x2="24" y2="-14" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" />
        <line x1="0" y1="0" x2="28" y2="0" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round" />
        <line x1="0" y1="0" x2="24" y2="14" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" />
        <line x1="0" y1="0" x2="14" y2="24" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" />
        <line x1="0" y1="0" x2="0" y2="28" stroke="#6366f1" stroke-width="1.8" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-14" y2="24" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-24" y2="14" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-28" y2="0" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-24" y2="-14" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-14" y2="-24" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" />
        <!-- Outer sparkle dots -->
        <circle cx="0" cy="-28" r="2.5" fill="#00d4ff" />
        <circle cx="14" cy="-24" r="2" fill="#00d4ff" />
        <circle cx="24" cy="-14" r="2" fill="#6366f1" />
        <circle cx="28" cy="0" r="2.5" fill="#00d4ff" />
        <circle cx="24" cy="14" r="2" fill="#6366f1" />
        <circle cx="14" cy="24" r="2" fill="#00d4ff" />
        <circle cx="-14" cy="24" r="2" fill="#00d4ff" />
        <circle cx="-24" cy="14" r="2" fill="#6366f1" />
        <circle cx="-28" cy="0" r="2.5" fill="#00d4ff" />
        <circle cx="-14" cy="-24" r="2" fill="#00d4ff" />
        <!-- Inner ring -->
        <circle cx="0" cy="-14" r="1.5" fill="#e0f7ff" />
        <circle cx="14" cy="0" r="1.5" fill="#e0f7ff" />
        <circle cx="0" cy="14" r="1.5" fill="#e0f7ff" />
        <circle cx="-14" cy="0" r="1.5" fill="#e0f7ff" />
    </g>

    <!-- Firework 2 - Purple/violet peony -->
    <g class="e2" transform="translate(350, 45)">
        <line x1="0" y1="0" x2="0" y2="-35" stroke="#bb86fc" stroke-width="2" stroke-linecap="round" />
        <line x1="0" y1="0" x2="25" y2="-25" stroke="#e0aaff" stroke-width="1.8" stroke-linecap="round" />
        <line x1="0" y1="0" x2="35" y2="0" stroke="#bb86fc" stroke-width="2" stroke-linecap="round" />
        <line x1="0" y1="0" x2="25" y2="25" stroke="#e0aaff" stroke-width="1.8" stroke-linecap="round" />
        <line x1="0" y1="0" x2="0" y2="35" stroke="#bb86fc" stroke-width="2" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-25" y2="25" stroke="#e0aaff" stroke-width="1.8" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-35" y2="0" stroke="#bb86fc" stroke-width="2" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-25" y2="-25" stroke="#e0aaff" stroke-width="1.8" stroke-linecap="round" />
        <!-- Secondary rays -->
        <line x1="0" y1="0" x2="12" y2="-32" stroke="#d4a6ff" stroke-width="1.2" stroke-linecap="round" />
        <line x1="0" y1="0" x2="32" y2="-12" stroke="#d4a6ff" stroke-width="1.2" stroke-linecap="round" />
        <line x1="0" y1="0" x2="32" y2="12" stroke="#d4a6ff" stroke-width="1.2" stroke-linecap="round" />
        <line x1="0" y1="0" x2="12" y2="32" stroke="#d4a6ff" stroke-width="1.2" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-12" y2="32" stroke="#d4a6ff" stroke-width="1.2" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-32" y2="12" stroke="#d4a6ff" stroke-width="1.2" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-32" y2="-12" stroke="#d4a6ff" stroke-width="1.2" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-12" y2="-32" stroke="#d4a6ff" stroke-width="1.2" stroke-linecap="round" />
        <!-- Dots -->
        <circle cx="0" cy="-35" r="3" fill="#bb86fc" />
        <circle cx="25" cy="-25" r="2.5" fill="#e0aaff" />
        <circle cx="35" cy="0" r="3" fill="#bb86fc" />
        <circle cx="25" cy="25" r="2.5" fill="#e0aaff" />
        <circle cx="-25" cy="-25" r="2.5" fill="#e0aaff" />
        <circle cx="-35" cy="0" r="3" fill="#bb86fc" />
        <circle cx="12" cy="-32" r="1.8" fill="#d4a6ff" />
        <circle cx="32" cy="-12" r="1.8" fill="#d4a6ff" />
        <circle cx="-12" cy="32" r="1.8" fill="#d4a6ff" />
        <circle cx="-32" cy="12" r="1.8" fill="#d4a6ff" />
        <!-- Center flash -->
        <circle cx="0" cy="0" r="4" fill="#fff" opacity="0.7" />
    </g>

    <!-- Firework 3 - Gold willow -->
    <g class="e3" transform="translate(550, 55)">
        <path d="M 0 0 Q 5 -15 3 -25" fill="none" stroke="#f1e05a" stroke-width="1.5" stroke-linecap="round" />
        <path d="M 0 0 Q 15 -10 22 -18" fill="none" stroke="#ffa657" stroke-width="1.5" stroke-linecap="round" />
        <path d="M 0 0 Q 18 0 25 5" fill="none" stroke="#f1e05a" stroke-width="1.5" stroke-linecap="round" />
        <path d="M 0 0 Q 12 15 15 22" fill="none" stroke="#ffa657" stroke-width="1.5" stroke-linecap="round" />
        <path d="M 0 0 Q -5 18 -3 25" fill="none" stroke="#f1e05a" stroke-width="1.5" stroke-linecap="round" />
        <path d="M 0 0 Q -15 10 -20 18" fill="none" stroke="#ffa657" stroke-width="1.5" stroke-linecap="round" />
        <path d="M 0 0 Q -18 -5 -25 -3" fill="none" stroke="#f1e05a" stroke-width="1.5" stroke-linecap="round" />
        <path d="M 0 0 Q -10 -15 -15 -22" fill="none" stroke="#ffa657" stroke-width="1.5" stroke-linecap="round" />
        <circle cx="3" cy="-25" r="2" fill="#f1e05a" />
        <circle cx="22" cy="-18" r="2" fill="#ffa657" />
        <circle cx="25" cy="5" r="2" fill="#f1e05a" />
        <circle cx="15" cy="22" r="2" fill="#ffa657" />
        <circle cx="-3" cy="25" r="2" fill="#f1e05a" />
        <circle cx="-20" cy="18" r="2" fill="#ffa657" />
        <circle cx="-25" cy="-3" r="2" fill="#f1e05a" />
        <circle cx="-15" cy="-22" r="2" fill="#ffa657" />
    </g>

    <!-- Firework 4 - Red/coral -->
    <g class="e4" transform="translate(250, 70)">
        <line x1="0" y1="0" x2="0" y2="-22" stroke="#ff6b6b" stroke-width="1.8" stroke-linecap="round" />
        <line x1="0" y1="0" x2="16" y2="-16" stroke="#ff9999" stroke-width="1.5" stroke-linecap="round" />
        <line x1="0" y1="0" x2="22" y2="0" stroke="#ff6b6b" stroke-width="1.8" stroke-linecap="round" />
        <line x1="0" y1="0" x2="16" y2="16" stroke="#ff9999" stroke-width="1.5" stroke-linecap="round" />
        <line x1="0" y1="0" x2="0" y2="22" stroke="#ff6b6b" stroke-width="1.8" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-16" y2="16" stroke="#ff9999" stroke-width="1.5" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-22" y2="0" stroke="#ff6b6b" stroke-width="1.8" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-16" y2="-16" stroke="#ff9999" stroke-width="1.5" stroke-linecap="round" />
        <circle cx="0" cy="-22" r="2.5" fill="#ff6b6b" />
        <circle cx="22" cy="0" r="2.5" fill="#ff6b6b" />
        <circle cx="0" cy="22" r="2.5" fill="#ff6b6b" />
        <circle cx="-22" cy="0" r="2.5" fill="#ff6b6b" />
        <circle cx="16" cy="-16" r="2" fill="#ff9999" />
        <circle cx="-16" cy="-16" r="2" fill="#ff9999" />
        <circle cx="0" cy="0" r="3" fill="#fff" opacity="0.5" />
    </g>

    <!-- Firework 5 - Green sparkle -->
    <g class="e5" transform="translate(480, 85)">
        <line x1="0" y1="0" x2="0" y2="-20" stroke="#7ee787" stroke-width="1.5" stroke-linecap="round" />
        <line x1="0" y1="0" x2="14" y2="-14" stroke="#3fb950" stroke-width="1.3" stroke-linecap="round" />
        <line x1="0" y1="0" x2="20" y2="0" stroke="#7ee787" stroke-width="1.5" stroke-linecap="round" />
        <line x1="0" y1="0" x2="14" y2="14" stroke="#3fb950" stroke-width="1.3" stroke-linecap="round" />
        <line x1="0" y1="0" x2="0" y2="20" stroke="#7ee787" stroke-width="1.5" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-14" y2="14" stroke="#3fb950" stroke-width="1.3" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-20" y2="0" stroke="#7ee787" stroke-width="1.5" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-14" y2="-14" stroke="#3fb950" stroke-width="1.3" stroke-linecap="round" />
        <circle cx="0" cy="-20" r="2" fill="#7ee787" />
        <circle cx="20" cy="0" r="2" fill="#7ee787" />
        <circle cx="0" cy="20" r="2" fill="#7ee787" />
        <circle cx="-20" cy="0" r="2" fill="#7ee787" />
    </g>

    <!-- Dripping sparks -->
    <g class="d1">
        <circle cx="125" cy="80" r="1" fill="#00d4ff" />
        <circle cx="135" cy="85" r="0.8" fill="#6366f1" />
        <circle cx="118" cy="78" r="0.8" fill="#00d4ff" />
    </g>
    <g class="d2">
        <circle cx="345" cy="68" r="1.2" fill="#bb86fc" />
        <circle cx="358" cy="72" r="1" fill="#e0aaff" />
        <circle cx="340" cy="65" r="0.8" fill="#d4a6ff" />
    </g>
    <g class="d3">
        <circle cx="545" cy="72" r="1" fill="#f1e05a" />
        <circle cx="558" cy="70" r="0.8" fill="#ffa657" />
    </g>
    <g class="d4">
        <circle cx="245" cy="88" r="1" fill="#ff6b6b" />
        <circle cx="256" cy="85" r="0.8" fill="#ff9999" />
    </g>

    <!-- Twinkling background stars -->
    <circle cx="50" cy="30" r="1.2" fill="#fff" class="s1" />
    <circle cx="170" cy="140" r="1" fill="#fff" class="s2" />
    <circle cx="310" cy="20" r="1.5" fill="#fff" class="s3" />
    <circle cx="420" cy="150" r="1" fill="#fff" class="s4" />
    <circle cx="600" cy="25" r="1.3" fill="#fff" class="s5" />
    <circle cx="660" cy="120" r="1" fill="#fff" class="s6" />
    <circle cx="80" cy="110" r="1.2" fill="#fff" class="s7" />
    <circle cx="220" cy="15" r="1" fill="#fff" class="s1" />
    <circle cx="500" cy="150" r="1.3" fill="#fff" class="s3" />
    <circle cx="380" cy="160" r="1" fill="#fff" class="s5" />
    <circle cx="640" cy="70" r="1.2" fill="#fff" class="s2" />
    <circle cx="30" cy="80" r="1" fill="#fff" class="s4" />
    <circle cx="450" cy="25" r="1.2" fill="#fff" class="s6" />
    <circle cx="150" cy="50" r="1" fill="#fff" class="s7" />
</svg>