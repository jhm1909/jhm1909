<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -15 700 95" width="700" height="95">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#bb86fc;stop-opacity:1" />
        </linearGradient>
    </defs>
    <style>
        @keyframes tail-wag {

            0%,
            100% {
                transform: rotate(0deg)
            }

            50% {
                transform: rotate(12deg)
            }
        }

        @keyframes blink {

            0%,
            90%,
            92%,
            100% {
                transform: scaleY(1)
            }

            91% {
                transform: scaleY(0.1)
            }
        }

        @keyframes dangle {

            0%,
            100% {
                transform: rotate(-3deg)
            }

            50% {
                transform: rotate(3deg)
            }
        }

        .tail {
            animation: tail-wag 2s ease-in-out infinite;
            transform-origin: 640px 8px
        }

        .eyes {
            animation: blink 4s linear infinite;
            transform-origin: center;
            transform-box: fill-box;
        }

        .cat-hang {
            animation: dangle 3s ease-in-out infinite;
            transform-origin: 660px 0px
        }

        .vine-leaf {
            animation: leaf-sway 3s ease-in-out infinite alternate;
            transform-box: fill-box;
            transform-origin: left center;
        }

        @keyframes leaf-sway {
            0% {
                transform: rotate(-5deg);
            }

            100% {
                transform: rotate(5deg);
            }
        }
    </style>
    <!-- Header bar -->
    <rect x="30" y="20" width="640" height="40" rx="20" fill="url(#bg)" />
    <text x="350" y="46" font-family="Segoe UI,sans-serif" font-size="16" font-weight="bold" fill="white"
        text-anchor="middle" letter-spacing="2">ABOUT ME</text>

    <!-- Vine entering from left -->
    <g>
        <!-- Main vine stem — straighter path hugging the bar top edge -->
        <path d="M 0 18 C 20 18 40 18 60 19 C 80 20 100 20 120 20 C 140 20 160 21 180 20 C 195 19 210 19 220 19"
            fill="none" stroke="#2ea043" stroke-width="3" stroke-linecap="round" />
        <!-- Small tendril -->
        <path d="M 5 18 Q 10 22 8 28" fill="none" stroke="#2ea043" stroke-width="2" stroke-linecap="round" />

        <!-- Leaf 1 at x≈40 — stem connects vine(y≈18) to leaf -->
        <g class="vine-leaf">
            <line x1="40" y1="18" x2="40" y2="12" stroke="#2ea043" stroke-width="2" />
            <path d="M 40 12 Q 30 4 38 0 Q 48 3 40 12 Z" fill="#3fb950" />
        </g>
        <!-- Leaf 2 at x≈80 — stem connects vine(y≈20) to leaf -->
        <g class="vine-leaf">
            <line x1="80" y1="20" x2="82" y2="13" stroke="#2ea043" stroke-width="2" />
            <path d="M 82 13 Q 74 4 82 0 Q 92 5 82 13 Z" fill="#7ee787" />
        </g>
        <!-- Leaf 3 at x≈120 — stem connects vine(y≈20) to leaf -->
        <g class="vine-leaf">
            <line x1="120" y1="20" x2="120" y2="13" stroke="#2ea043" stroke-width="2" />
            <path d="M 120 13 Q 110 5 118 1 Q 128 4 120 13 Z" fill="#3fb950" />
        </g>
        <!-- Leaf 4 at x≈160 — stem connects vine(y≈21) to leaf -->
        <g class="vine-leaf">
            <line x1="160" y1="21" x2="162" y2="14" stroke="#2ea043" stroke-width="2" />
            <path d="M 162 14 Q 152 6 160 2 Q 170 7 162 14 Z" fill="#7ee787" />
        </g>
    </g>

    <!-- Cat sitting on top of right edge of header -->
    <g class="cat-hang">
        <!-- Tail — starts from the back of the body, close to it -->
        <g class="tail">
            <path d="M 664 14 Q 674 5, 680 12 Q 683 18, 678 15" fill="none" stroke="#f4a460" stroke-width="4"
                stroke-linecap="round" />
        </g>
        <!-- Body sitting on bar -->
        <ellipse cx="654" cy="14" rx="14" ry="12" fill="#f4a460" />
        <ellipse cx="654" cy="16" rx="9" ry="8" fill="#ffdab9" />
        <!-- Head on top -->
        <circle cx="654" cy="0" r="12" fill="#f4a460" />
        <!-- Ears pointing UP -->
        <polygon points="644,-10 647,0 650,-8" fill="#f4a460" />
        <polygon points="658,-8 661,0 664,-10" fill="#f4a460" />
        <polygon points="645,-7 648,-1 649,-7" fill="#ff69b4" opacity="0.4" />
        <polygon points="659,-7 661,-1 663,-7" fill="#ff69b4" opacity="0.4" />
        <!-- Eyes looking forward -->
        <g class="eyes">
            <circle cx="649" cy="-1" r="3" fill="#66ff66" />
            <circle cx="659" cy="-1" r="3" fill="#66ff66" />
            <circle cx="649.5" cy="-1" r="1.5" fill="#111" />
            <circle cx="659.5" cy="-1" r="1.5" fill="#111" />
            <circle cx="648.8" cy="-2" r="0.6" fill="white" />
            <circle cx="658.8" cy="-2" r="0.6" fill="white" />
        </g>
        <!-- Nose -->
        <ellipse cx="654" cy="3" rx="1.8" ry="1.2" fill="#ff69b4" />
        <!-- Front paws on bar — bigger -->
        <ellipse cx="646" cy="22" rx="7" ry="4" fill="#f4a460" />
        <ellipse cx="662" cy="22" rx="7" ry="4" fill="#f4a460" />
        <!-- Paw pads -->
        <circle cx="644" cy="23" r="1.2" fill="#ff69b4" opacity="0.3" />
        <circle cx="648" cy="23.5" r="1" fill="#ff69b4" opacity="0.3" />
        <circle cx="660" cy="23" r="1.2" fill="#ff69b4" opacity="0.3" />
        <circle cx="664" cy="23.5" r="1" fill="#ff69b4" opacity="0.3" />
    </g>
</svg>