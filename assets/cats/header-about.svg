<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 70" width="700" height="70">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#bb86fc;stop-opacity:1" />
        </linearGradient>
    </defs>
    <style>
        @keyframes tail-wag {

            0%,
            100% {
                transform: rotate(0deg)
            }

            50% {
                transform: rotate(12deg)
            }
        }

        @keyframes blink {

            0%,
            90%,
            92%,
            100% {
                transform: scaleY(1)
            }

            91% {
                transform: scaleY(0.1)
            }
        }

        @keyframes dangle {

            0%,
            100% {
                transform: rotate(-3deg)
            }

            50% {
                transform: rotate(3deg)
            }
        }

        .tail {
            animation: tail-wag 2s ease-in-out infinite;
            transform-origin: 640px 8px
        }

        .eyes {
            animation: blink 4s linear infinite;
            transform-origin: center
        }

        .cat-hang {
            animation: dangle 3s ease-in-out infinite;
            transform-origin: 660px 0px
        }
    </style>
    <!-- Header bar -->
    <rect x="30" y="15" width="640" height="40" rx="20" fill="url(#bg)" />
    <text x="350" y="41" font-family="Segoe UI,sans-serif" font-size="16" font-weight="bold" fill="white"
        text-anchor="middle" letter-spacing="2">ABOUT ME</text>
    <!-- Cat hanging off right edge of header -->
    <g class="cat-hang">
        <!-- Paws gripping top of bar -->
        <ellipse cx="648" cy="16" rx="5" ry="3" fill="#f4a460" />
        <ellipse cx="660" cy="16" rx="5" ry="3" fill="#f4a460" />
        <!-- Body hanging down -->
        <ellipse cx="654" cy="35" rx="12" ry="16" fill="#f4a460" />
        <ellipse cx="654" cy="38" rx="8" ry="10" fill="#ffdab9" />
        <!-- Head -->
        <circle cx="654" cy="52" r="10" fill="#f4a460" />
        <!-- Ears -->
        <polygon points="646,46 648,38 651,45" fill="#f4a460" />
        <polygon points="657,45 660,38 662,46" fill="#f4a460" />
        <polygon points="647,45 649,40 650,45" fill="#ff69b4" opacity="0.4" />
        <polygon points="658,45 660,40 661,45" fill="#ff69b4" opacity="0.4" />
        <!-- Eyes looking up -->
        <g class="eyes">
            <circle cx="650" cy="51" r="2.5" fill="#66ff66" />
            <circle cx="658" cy="51" r="2.5" fill="#66ff66" />
            <circle cx="650" cy="51.5" r="1.3" fill="#111" />
            <circle cx="658" cy="51.5" r="1.3" fill="#111" />
            <circle cx="649.5" cy="50.5" r="0.5" fill="white" />
            <circle cx="657.5" cy="50.5" r="0.5" fill="white" />
        </g>
        <!-- Nose -->
        <ellipse cx="654" cy="54.5" rx="1.5" ry="1" fill="#ff69b4" />
        <!-- Tail hanging -->
        <g class="tail">
            <path d="M 640 8 Q 630 15, 632 25 Q 634 32, 630 28" fill="none" stroke="#f4a460" stroke-width="4"
                stroke-linecap="round" />
        </g>
    </g>
</svg>