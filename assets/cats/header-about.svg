<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -15 700 105" width="700" height="105">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#bb86fc;stop-opacity:1" />
        </linearGradient>
    </defs>
    <style>
        @keyframes tail-wag {

            0%,
            100% {
                transform: rotate(0deg)
            }

            50% {
                transform: rotate(12deg)
            }
        }

        @keyframes blink {

            0%,
            90%,
            92%,
            100% {
                transform: scaleY(1)
            }

            91% {
                transform: scaleY(0.1)
            }
        }

        @keyframes dangle {

            0%,
            100% {
                transform: rotate(-3deg)
            }

            50% {
                transform: rotate(3deg)
            }
        }

        .tail {
            animation: tail-wag 2s ease-in-out infinite;
            transform-origin: 640px 8px
        }

        .eyes {
            animation: blink 4s linear infinite;
            transform-origin: center;
            transform-box: fill-box;
        }

        .cat-hang {
            animation: dangle 3s ease-in-out infinite;
            transform-origin: 660px 0px
        }

        .vine-leaf {
            animation: leaf-sway 3s ease-in-out infinite alternate;
            transform-box: fill-box;
            transform-origin: left center;
        }

        @keyframes leaf-sway {
            0% {
                transform: rotate(-5deg);
            }

            100% {
                transform: rotate(5deg);
            }
        }
    </style>
    <!-- Header bar -->
    <rect x="30" y="20" width="640" height="40" rx="20" fill="url(#bg)" />
    <text x="350" y="46" font-family="Segoe UI,sans-serif" font-size="16" font-weight="bold" fill="white"
        text-anchor="middle" letter-spacing="2">ABOUT ME</text>

    <!-- Vine wrapping around the header bar -->
    <g>
        <!--
            Bar is at y=20..60. Vine weaves:
            Start left → above bar (y=15) → cross down through bar → below bar (y=65) → back up above (y=15) → cross down again → below (y=65) → exit
        -->
        <!-- Back portion of vine (behind bar) rendered first -->
        <path d="M 0 15
            C 25 15, 45 15, 60 30
            C 75 50, 85 65, 100 65
            C 115 65, 125 65, 140 50
            C 150 35, 155 15, 175 15
            C 190 15, 195 15, 210 30
            C 220 45, 225 65, 240 65" fill="none" stroke="#2ea043" stroke-width="3.5" stroke-linecap="round"
            opacity="0.4" />

        <!-- Front portion of vine (in front of bar) — same path but clipped to visible areas -->
        <path d="M 0 15
            C 25 15, 45 15, 60 30
            C 75 50, 85 65, 100 65
            C 115 65, 125 65, 140 50
            C 150 35, 155 15, 175 15
            C 190 15, 195 15, 210 30
            C 220 45, 225 65, 240 65" fill="none" stroke="#2ea043" stroke-width="3.5" stroke-linecap="round" />

        <!-- Small tendril at entry -->
        <path d="M 3 15 Q 0 22 5 28" fill="none" stroke="#2ea043" stroke-width="2" stroke-linecap="round" />
        <path d="M 240 65 Q 248 68 245 75" fill="none" stroke="#2ea043" stroke-width="2" stroke-linecap="round" />

        <!-- Leaves at vine peaks/valleys, attached with stems -->

        <!-- Leaf 1: top of first peak (x≈30, y≈15) — above bar -->
        <g class="vine-leaf">
            <line x1="30" y1="15" x2="28" y2="7" stroke="#2ea043" stroke-width="2" />
            <path d="M 28 7 Q 18 0 26 -4 Q 36 1 28 7 Z" fill="#3fb950" />
        </g>

        <!-- Leaf 2: top of first peak (x≈50, y≈17) — above bar -->
        <g class="vine-leaf">
            <line x1="50" y1="17" x2="52" y2="9" stroke="#2ea043" stroke-width="2" />
            <path d="M 52 9 Q 44 1 52 -2 Q 62 3 52 9 Z" fill="#7ee787" />
        </g>

        <!-- Leaf 3: bottom of first valley (x≈100, y≈65) — below bar -->
        <g class="vine-leaf">
            <line x1="100" y1="65" x2="98" y2="72" stroke="#2ea043" stroke-width="2" />
            <path d="M 98 72 Q 88 78 96 82 Q 106 77 98 72 Z" fill="#3fb950" />
        </g>

        <!-- Leaf 4: top of second peak (x≈175, y≈15) — above bar -->
        <g class="vine-leaf">
            <line x1="175" y1="15" x2="173" y2="7" stroke="#2ea043" stroke-width="2" />
            <path d="M 173 7 Q 163 0 171 -4 Q 181 1 173 7 Z" fill="#7ee787" />
        </g>

        <!-- Leaf 5: top of second peak (x≈190, y≈15) — above bar -->
        <g class="vine-leaf">
            <line x1="190" y1="15" x2="193" y2="8" stroke="#2ea043" stroke-width="2" />
            <path d="M 193 8 Q 185 1 193 -2 Q 201 3 193 8 Z" fill="#3fb950" />
        </g>

        <!-- Leaf 6: bottom of second valley (x≈235, y≈65) — below bar -->
        <g class="vine-leaf">
            <line x1="235" y1="65" x2="237" y2="72" stroke="#2ea043" stroke-width="2" />
            <path d="M 237 72 Q 229 78 237 82 Q 245 77 237 72 Z" fill="#7ee787" />
        </g>
    </g>


    <!-- Cat sitting on top of right edge of header -->
    <g class="cat-hang">
        <!-- Tail — starts from the back of the body, close to it -->
        <g class="tail">
            <path d="M 664 14 Q 674 5, 680 12 Q 683 18, 678 15" fill="none" stroke="#f4a460" stroke-width="4"
                stroke-linecap="round" />
        </g>
        <!-- Body sitting on bar -->
        <ellipse cx="654" cy="14" rx="14" ry="12" fill="#f4a460" />
        <ellipse cx="654" cy="16" rx="9" ry="8" fill="#ffdab9" />
        <!-- Head on top -->
        <circle cx="654" cy="0" r="12" fill="#f4a460" />
        <!-- Ears pointing UP -->
        <polygon points="644,-10 647,0 650,-8" fill="#f4a460" />
        <polygon points="658,-8 661,0 664,-10" fill="#f4a460" />
        <polygon points="645,-7 648,-1 649,-7" fill="#ff69b4" opacity="0.4" />
        <polygon points="659,-7 661,-1 663,-7" fill="#ff69b4" opacity="0.4" />
        <!-- Eyes looking forward -->
        <g class="eyes">
            <circle cx="649" cy="-1" r="3" fill="#66ff66" />
            <circle cx="659" cy="-1" r="3" fill="#66ff66" />
            <circle cx="649.5" cy="-1" r="1.5" fill="#111" />
            <circle cx="659.5" cy="-1" r="1.5" fill="#111" />
            <circle cx="648.8" cy="-2" r="0.6" fill="white" />
            <circle cx="658.8" cy="-2" r="0.6" fill="white" />
        </g>
        <!-- Nose -->
        <ellipse cx="654" cy="3" rx="1.8" ry="1.2" fill="#ff69b4" />
        <!-- Front paws on bar — bigger -->
        <ellipse cx="646" cy="22" rx="7" ry="4" fill="#f4a460" />
        <ellipse cx="662" cy="22" rx="7" ry="4" fill="#f4a460" />
        <!-- Paw pads -->
        <circle cx="644" cy="23" r="1.2" fill="#ff69b4" opacity="0.3" />
        <circle cx="648" cy="23.5" r="1" fill="#ff69b4" opacity="0.3" />
        <circle cx="660" cy="23" r="1.2" fill="#ff69b4" opacity="0.3" />
        <circle cx="664" cy="23.5" r="1" fill="#ff69b4" opacity="0.3" />
    </g>
</svg>