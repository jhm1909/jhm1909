<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 85" width="700" height="85">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#00d4ff" />
            <stop offset="100%" style="stop-color:#bb86fc" />
        </linearGradient>
    </defs>
    <style>
        @keyframes stretch {

            0%,
            100% {
                transform: scaleX(1) translateX(0)
            }

            50% {
                transform: scaleX(1.05) translateX(-2px)
            }
        }

        @keyframes tail-lazy {

            0%,
            100% {
                transform: rotate(-5deg)
            }

            50% {
                transform: rotate(8deg)
            }
        }

        .cat-lazy {
            animation: stretch 4s ease-in-out infinite;
            transform-origin: center;
            transform-box: fill-box;
        }

        .tail {
            animation: tail-lazy 3s ease-in-out infinite;
            transform-origin: 620px 30px
        }

        .flower-sway {
            animation: sway 3s ease-in-out infinite alternate;
            transform-origin: bottom center;
            transform-box: fill-box;
        }

        @keyframes sway {
            0% {
                transform: rotate(-3deg);
            }

            100% {
                transform: rotate(3deg);
            }
        }
    </style>
    <rect x="30" y="20" width="640" height="40" rx="20" fill="url(#bg)" />
    <text x="350" y="46" font-family="Segoe UI,sans-serif" font-size="16" font-weight="bold" fill="white"
        text-anchor="middle" letter-spacing="2">CONTRIBUTION ACTIVITY</text>
    <!-- Cat lying lazily ON TOP of bar, right side -->
    <g class="cat-lazy" transform="translate(560, 0)">
        <g class="tail">
            <path d="M 60 12 Q 75 0, 80 8 Q 82 12, 78 10" fill="none" stroke="#f5deb3" stroke-width="4"
                stroke-linecap="round" />
        </g>
        <ellipse cx="45" cy="14" rx="20" ry="8" fill="#f5deb3" />
        <ellipse cx="45" cy="15" rx="13" ry="5" fill="#ffefd5" />
        <!-- Head resting -->
        <circle cx="28" cy="13" r="9" fill="#f5deb3" />
        <polygon points="21,7 23,0 26,7" fill="#f5deb3" />
        <polygon points="30,7 33,0 35,7" fill="#f5deb3" />
        <polygon points="22,6 23,2 25,6" fill="#ff69b4" opacity="0.35" />
        <polygon points="31,6 33,2 34,6" fill="#ff69b4" opacity="0.35" />
        <!-- Sleepy eyes (half-closed arcs) -->
        <path d="M 24 12 Q 26 10.5, 28 12" fill="none" stroke="#333" stroke-width="1.2" stroke-linecap="round" />
        <path d="M 30 11.5 Q 32 10, 34 11.5" fill="none" stroke="#333" stroke-width="1.2" stroke-linecap="round" />
        <ellipse cx="29" cy="15" rx="1.2" ry="0.8" fill="#ff69b4" />
        <!-- Front paw dangling off edge -->
        <ellipse cx="22" cy="21" rx="4" ry="2.5" fill="#f5deb3" />
    </g>

    <!-- Flower Patch on the left -->
    <g class="flower-sway" transform="translate(45, 10)">
        <path d="M 0 30 Q 15 35 30 30 Q 15 45 0 30" fill="#2ea043" />
        <path d="M 20 28 Q 30 35 40 28 Q 30 40 20 28" fill="#3fb950" />
        <path d="M -10 25 Q 0 35 10 25 Q 0 40 -10 25" fill="#3fb950" />

        <!-- Flower 1 -->
        <g transform="translate(0, 15)">
            <path d="M 0 0 Q 3 10 5 15" fill="none" stroke="#2ea043" stroke-width="2" />
            <circle cx="0" cy="-3" r="4" fill="#ff7b72" />
            <circle cx="-3" cy="0" r="4" fill="#ff7b72" />
            <circle cx="3" cy="0" r="4" fill="#ff7b72" />
            <circle cx="0" cy="3" r="4" fill="#ff7b72" />
            <circle cx="0" cy="0" r="3" fill="#f1e05a" />
        </g>

        <!-- Flower 2 -->
        <g transform="translate(18, 5) scale(0.8)">
            <path d="M 0 0 Q -2 15 -5 23" fill="none" stroke="#2ea043" stroke-width="2.5" />
            <circle cx="0" cy="-3" r="4" fill="#bb86fc" />
            <circle cx="-3" cy="0" r="4" fill="#bb86fc" />
            <circle cx="3" cy="0" r="4" fill="#bb86fc" />
            <circle cx="0" cy="3" r="4" fill="#bb86fc" />
            <circle cx="0" cy="0" r="3" fill="#f1e05a" />
        </g>

        <!-- Flower 3 -->
        <g transform="translate(32, 12) scale(0.9)">
            <path d="M 0 0 Q -3 10 -5 18" fill="none" stroke="#2ea043" stroke-width="2" />
            <circle cx="0" cy="-3" r="4" fill="#ffa657" />
            <circle cx="-3" cy="0" r="4" fill="#ffa657" />
            <circle cx="3" cy="0" r="4" fill="#ffa657" />
            <circle cx="0" cy="3" r="4" fill="#ffa657" />
            <circle cx="0" cy="0" r="3" fill="#f1e05a" />
        </g>
    </g>
</svg>