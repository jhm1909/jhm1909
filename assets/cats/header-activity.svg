<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 65" width="700" height="65">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#00d4ff" />
            <stop offset="100%" style="stop-color:#bb86fc" />
        </linearGradient>
    </defs>
    <style>
        @keyframes stretch {

            0%,
            100% {
                transform: scaleX(1) translateX(0)
            }

            50% {
                transform: scaleX(1.05) translateX(-2px)
            }
        }

        @keyframes tail-lazy {

            0%,
            100% {
                transform: rotate(-5deg)
            }

            50% {
                transform: rotate(8deg)
            }
        }

        .cat-lazy {
            animation: stretch 4s ease-in-out infinite;
            transform-origin: center;
            transform-box: fill-box;
        }

        .tail {
            animation: tail-lazy 3s ease-in-out infinite;
            transform-origin: 620px 30px
        }
    </style>
    <rect x="30" y="20" width="640" height="40" rx="20" fill="url(#bg)" />
    <text x="350" y="46" font-family="Segoe UI,sans-serif" font-size="16" font-weight="bold" fill="white"
        text-anchor="middle" letter-spacing="2">CONTRIBUTION ACTIVITY</text>
    <!-- Cat lying lazily ON TOP of bar, right side -->
    <g class="cat-lazy" transform="translate(560, 0)">
        <g class="tail">
            <path d="M 60 12 Q 75 0, 80 8 Q 82 12, 78 10" fill="none" stroke="#f5deb3" stroke-width="4"
                stroke-linecap="round" />
        </g>
        <ellipse cx="45" cy="14" rx="20" ry="8" fill="#f5deb3" />
        <ellipse cx="45" cy="15" rx="13" ry="5" fill="#ffefd5" />
        <!-- Head resting -->
        <circle cx="28" cy="13" r="9" fill="#f5deb3" />
        <polygon points="21,7 23,0 26,7" fill="#f5deb3" />
        <polygon points="30,7 33,0 35,7" fill="#f5deb3" />
        <polygon points="22,6 23,2 25,6" fill="#ff69b4" opacity="0.35" />
        <polygon points="31,6 33,2 34,6" fill="#ff69b4" opacity="0.35" />
        <!-- Sleepy eyes (half-closed arcs) -->
        <path d="M 24 12 Q 26 10.5, 28 12" fill="none" stroke="#333" stroke-width="1.2" stroke-linecap="round" />
        <path d="M 30 11.5 Q 32 10, 34 11.5" fill="none" stroke="#333" stroke-width="1.2" stroke-linecap="round" />
        <ellipse cx="29" cy="15" rx="1.2" ry="0.8" fill="#ff69b4" />
        <!-- Front paw dangling off edge -->
        <ellipse cx="22" cy="21" rx="4" ry="2.5" fill="#f5deb3" />
    </g>
</svg>