<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 85" width="700" height="85">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#00d4ff" />
            <stop offset="100%" style="stop-color:#bb86fc" />
        </linearGradient>
    </defs>
    <style>
        @keyframes wave-hi {

            0%,
            100% {
                transform: rotate(0)
            }

            25% {
                transform: rotate(-25deg)
            }

            50% {
                transform: rotate(10deg)
            }

            75% {
                transform: rotate(-20deg)
            }
        }

        @keyframes tail {

            0%,
            100% {
                transform: rotate(0)
            }

            50% {
                transform: rotate(10deg)
            }
        }

        @keyframes blink {

            0%,
            88%,
            90%,
            100% {
                transform: scaleY(1)
            }

            89% {
                transform: scaleY(0.1)
            }
        }

        @keyframes sparkle {

            0%,
            100% {
                opacity: 0;
                transform: scale(0.5)
            }

            50% {
                opacity: 1;
                transform: scale(1)
            }
        }

        .wave {
            animation: wave-hi 1.2s ease-in-out infinite;
            transform-origin: 80px 22px
        }

        .tail {
            animation: tail 2s ease-in-out infinite;
            transform-origin: 30px 28px
        }

        .eyes {
            animation: blink 3s linear infinite;
            transform-origin: center;
            transform-box: fill-box;
        }

        .s1 {
            animation: sparkle 1.5s ease infinite
        }

        .s2 {
            animation: sparkle 1.5s ease 0.5s infinite
        }

        .flower-sway {
            animation: sway 3.5s ease-in-out infinite alternate;
            transform-origin: bottom center;
            transform-box: fill-box;
        }

        @keyframes sway {
            0% {
                transform: rotate(-3deg);
            }

            100% {
                transform: rotate(3deg);
            }
        }
    </style>
    <rect x="30" y="20" width="640" height="40" rx="20" fill="url(#bg)" />
    <text x="350" y="46" font-family="Segoe UI,sans-serif" font-size="16" font-weight="bold" fill="white"
        text-anchor="middle" letter-spacing="2">CONNECT WITH ME</text>
    <!-- Cat sitting on left, waving -->
    <g transform="translate(40, 0)">
        <g class="tail">
            <path d="M -10 28 Q -20 15, -15 25 Q -12 30, -16 26" fill="none" stroke="#fff" stroke-width="4"
                stroke-linecap="round" />
        </g>
        <ellipse cx="12" cy="30" rx="14" ry="12" fill="#fff" />
        <ellipse cx="12" cy="32" rx="9" ry="7" fill="#eee" />
        <!-- Head -->
        <circle cx="12" cy="14" r="10" fill="#fff" />
        <ellipse cx="7" cy="10" rx="4" ry="3" fill="#2c2c2c" opacity="0.7" />
        <polygon points="4,8 6,-1 9,7" fill="#fff" />
        <polygon points="15,7 18,-1 20,8" fill="#fff" />
        <polygon points="5,7 7,1 8,7" fill="#ff69b4" opacity="0.35" />
        <polygon points="16,7 18,1 19,7" fill="#ff69b4" opacity="0.35" />
        <g class="eyes">
            <circle cx="8" cy="13" r="2.5" fill="#4169E1" />
            <circle cx="16" cy="13" r="2.5" fill="#4169E1" />
            <circle cx="8.5" cy="13" r="1.3" fill="#111" />
            <circle cx="16.5" cy="13" r="1.3" fill="#111" />
        </g>
        <ellipse cx="12" cy="17" rx="1.2" ry="0.8" fill="#ff69b4" />
        <!-- Smiling -->
        <path d="M 12 18.5 Q 10 21, 8 20" fill="none" stroke="#999" stroke-width="0.7" />
        <path d="M 12 18.5 Q 14 21, 16 20" fill="none" stroke="#999" stroke-width="0.7" />
        <!-- Waving paw -->
        <g class="wave">
            <path d="M 20 22 Q 28 12, 35 8" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" />
            <ellipse cx="37" cy="6" rx="4" ry="3" fill="#fff" />
        </g>
        <ellipse cx="5" cy="40" rx="5" ry="3" fill="#fff" />
        <ellipse cx="20" cy="40" rx="5" ry="3" fill="#fff" />
    </g>
    <!-- Sparkles -->
    <text x="85" y="10" font-size="10" class="s1">✨</text>
    <text x="95" y="18" font-size="8" class="s2">⭐</text>

    <!-- Flower Patch on the right -->
    <g class="flower-sway" transform="translate(620, 10)">
        <path d="M 0 30 Q 15 35 30 30 Q 15 45 0 30" fill="#2ea043" />
        <path d="M 20 28 Q 30 35 40 28 Q 30 40 20 28" fill="#3fb950" />
        <path d="M -10 25 Q 0 35 10 25 Q 0 40 -10 25" fill="#3fb950" />

        <!-- White Flower 1 -->
        <g transform="translate(0, 15)">
            <path d="M 0 0 Q 3 10 5 15" fill="none" stroke="#2ea043" stroke-width="2" />
            <circle cx="0" cy="-3" r="4" fill="#ffffff" />
            <circle cx="-3" cy="0" r="4" fill="#ffffff" />
            <circle cx="3" cy="0" r="4" fill="#ffffff" />
            <circle cx="0" cy="3" r="4" fill="#ffffff" />
            <circle cx="0" cy="0" r="3" fill="#ffa657" />
        </g>

        <!-- White Flower 2 -->
        <g transform="translate(25, 8) scale(0.9)">
            <path d="M 0 0 Q -2 15 -5 23" fill="none" stroke="#2ea043" stroke-width="2.5" />
            <circle cx="0" cy="-3" r="4" fill="#ffffff" />
            <circle cx="-3" cy="0" r="4" fill="#ffffff" />
            <circle cx="3" cy="0" r="4" fill="#ffffff" />
            <circle cx="0" cy="3" r="4" fill="#ffffff" />
            <circle cx="0" cy="0" r="3" fill="#ffa657" />
        </g>
    </g>
</svg>