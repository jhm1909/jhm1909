<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 85" width="700" height="85">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#00d4ff" />
            <stop offset="100%" style="stop-color:#bb86fc" />
        </linearGradient>
    </defs>
    <style>
        @keyframes magnify {

            0%,
            100% {
                transform: rotate(-5deg)
            }

            50% {
                transform: rotate(5deg)
            }
        }

        @keyframes tail {

            0%,
            100% {
                transform: rotate(0)
            }

            50% {
                transform: rotate(8deg)
            }
        }

        @keyframes blink {

            0%,
            90%,
            92%,
            100% {
                transform: scaleY(1)
            }

            91% {
                transform: scaleY(0.1)
            }
        }

        .magnify {
            animation: magnify 2s ease-in-out infinite;
            transform-origin: 625px 28px
        }

        .tail {
            animation: tail 2s ease-in-out infinite;
            transform-origin: 670px 28px
        }

        .eyes {
            animation: blink 3.5s linear infinite;
            transform-origin: center;
            transform-box: fill-box;
        }

        .flower-sway {
            animation: sway 2.5s ease-in-out infinite alternate;
            transform-origin: bottom center;
            transform-box: fill-box;
        }

        @keyframes sway {
            0% {
                transform: rotate(-3deg);
            }

            100% {
                transform: rotate(3deg);
            }
        }
    </style>
    <rect x="30" y="20" width="640" height="40" rx="20" fill="url(#bg)" />
    <text x="350" y="46" font-family="Segoe UI,sans-serif" font-size="16" font-weight="bold" fill="white"
        text-anchor="middle" letter-spacing="2">DETAILED METRICS</text>
    <!-- Cat with magnifying glass, examining the header from right -->
    <g transform="translate(615, 2)">
        <g class="tail">
            <path d="M 55 26 Q 65 15, 68 25 Q 70 30, 65 27" fill="none" stroke="#f5deb3" stroke-width="4"
                stroke-linecap="round" />
        </g>
        <ellipse cx="40" cy="32" rx="14" ry="10" fill="#f5deb3" />
        <circle cx="30" cy="20" r="10" fill="#f5deb3" />
        <polygon points="22,14 24,5 27,13" fill="#f5deb3" />
        <polygon points="33,13 36,5 38,14" fill="#f5deb3" />
        <polygon points="23,13 25,7 26,13" fill="#ff69b4" opacity="0.35" />
        <polygon points="34,13 36,7 37,13" fill="#ff69b4" opacity="0.35" />
        <g class="eyes">
            <circle cx="26" cy="19" r="2.5" fill="#228B22" />
            <circle cx="34" cy="19" r="2.5" fill="#228B22" />
            <circle cx="26.5" cy="18.5" r="1.3" fill="#111" />
            <circle cx="34.5" cy="18.5" r="1.3" fill="#111" />
        </g>
        <ellipse cx="30" cy="23" rx="1.2" ry="0.8" fill="#ff69b4" />
        <!-- Magnifying glass -->
        <g class="magnify">
            <circle cx="12" cy="28" r="7" fill="none" stroke="#c0c0c0" stroke-width="2" />
            <circle cx="12" cy="28" r="5.5" fill="#e0f7ff" opacity="0.3" />
            <line x1="17" y1="33" x2="23" y2="39" stroke="#c0c0c0" stroke-width="2.5" stroke-linecap="round" />
        </g>
        <ellipse cx="30" cy="40" rx="5" ry="3" fill="#f5deb3" />
        <ellipse cx="46" cy="40" rx="5" ry="3" fill="#f5deb3" />
    </g>


</svg>