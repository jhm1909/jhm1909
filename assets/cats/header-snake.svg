<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -15 700 105" width="700" height="105">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#00d4ff" />
            <stop offset="100%" style="stop-color:#bb86fc" />
        </linearGradient>
    </defs>
    <style>
        @keyframes leaf-sway {

            0%,
            100% {
                transform: rotate(-3deg);
            }

            50% {
                transform: rotate(3deg);
            }
        }

        .leaf {
            animation: leaf-sway 3s ease-in-out infinite alternate;
            transform-origin: center bottom;
            transform-box: fill-box;
        }

        .leaf-d1 {
            animation-delay: 0s;
        }

        .leaf-d2 {
            animation-delay: 0.5s;
        }

        .leaf-d3 {
            animation-delay: 1s;
        }

        .leaf-d4 {
            animation-delay: 1.5s;
        }

        .leaf-d5 {
            animation-delay: 2s;
        }
    </style>
    <!-- Header bar -->
    <rect x="30" y="20" width="640" height="40" rx="20" fill="url(#bg)" />
    <text x="340" y="46" font-family="Segoe UI,sans-serif" font-size="16" font-weight="bold" fill="white"
        text-anchor="middle" letter-spacing="2">CONTRIBUTION SNAKE</text>

    <!-- Vine wrapping around header bar from right to left -->
    <g>
        <!-- Back vine (behind bar) — dimmed -->
        <path d="M 700 40
            C 680 40, 670 35, 650 20
            C 635 8, 620 0, 600 0
            C 580 0, 570 5, 555 20
            C 540 40, 530 65, 510 65
            C 490 65, 480 60, 465 45
            C 450 28, 440 10, 420 10
            C 400 10, 390 15, 375 30
            C 360 50, 350 70, 330 70
            C 310 70, 300 60, 285 45
            C 270 30, 260 10, 240 10" fill="none" stroke="#2ea043" stroke-width="3.5" stroke-linecap="round"
            opacity="0.35" />

        <!-- Front vine (in front of bar) — full opacity -->
        <path d="M 700 40
            C 680 40, 670 35, 650 20
            C 635 8, 620 0, 600 0
            C 580 0, 570 5, 555 20
            C 540 40, 530 65, 510 65
            C 490 65, 480 60, 465 45
            C 450 28, 440 10, 420 10
            C 400 10, 390 15, 375 30
            C 360 50, 350 70, 330 70
            C 310 70, 300 60, 285 45
            C 270 30, 260 10, 240 10" fill="none" stroke="#2ea043" stroke-width="3.5" stroke-linecap="round" />

        <!-- Tendrils -->
        <path d="M 695 40 Q 698 48 693 52" fill="none" stroke="#2ea043" stroke-width="2" stroke-linecap="round" />
        <path d="M 243 10 Q 238 18 242 24" fill="none" stroke="#2ea043" stroke-width="2" stroke-linecap="round" />
        <path d="M 370 35 Q 365 42 370 48" fill="none" stroke="#3fb950" stroke-width="1.5" stroke-linecap="round" />

        <!-- Leaves along the vine -->
        <!-- Leaf 1 — near right entry above bar -->
        <g class="leaf leaf-d1" transform="translate(630, -2)">
            <path d="M 0 8 Q -6 0, 0 -6 Q 6 0, 0 8 Z" fill="#2ea043" />
            <path d="M 0 8 L 0 -6" fill="none" stroke="#1a7f37" stroke-width="0.6" />
        </g>

        <!-- Leaf 2 — above bar, near top of first wave -->
        <g class="leaf leaf-d2" transform="translate(598, -4)">
            <path d="M 0 8 Q -7 0, 0 -7 Q 7 0, 0 8 Z" fill="#3fb950" />
            <path d="M 0 8 L 0 -7" fill="none" stroke="#1a7f37" stroke-width="0.6" />
        </g>

        <!-- Leaf 3 — below bar, bottom of second wave -->
        <g class="leaf leaf-d3" transform="translate(512, 64)">
            <path d="M 0 0 Q -6 -8, 0 -12 Q 6 -8, 0 0 Z" fill="#2ea043" />
            <path d="M 0 0 L 0 -12" fill="none" stroke="#1a7f37" stroke-width="0.6" />
        </g>

        <!-- Leaf 4 — above bar, top of third wave -->
        <g class="leaf leaf-d4" transform="translate(418, 6)">
            <path d="M 0 8 Q -6 0, 0 -6 Q 6 0, 0 8 Z" fill="#3fb950" />
            <path d="M 0 8 L 0 -6" fill="none" stroke="#1a7f37" stroke-width="0.6" />
        </g>

        <!-- Leaf 5 — below bar, bottom of fourth wave -->
        <g class="leaf leaf-d5" transform="translate(332, 68)">
            <path d="M 0 0 Q -7 -8, 0 -13 Q 7 -8, 0 0 Z" fill="#2ea043" />
            <path d="M 0 0 L 0 -13" fill="none" stroke="#1a7f37" stroke-width="0.6" />
        </g>

        <!-- Leaf 6 — near left exit -->
        <g class="leaf leaf-d1" transform="translate(270, 8)">
            <path d="M 0 8 Q -6 0, 0 -6 Q 6 0, 0 8 Z" fill="#3fb950" />
            <path d="M 0 8 L 0 -6" fill="none" stroke="#1a7f37" stroke-width="0.6" />
        </g>

        <!-- Small flower on vine -->
        <g transform="translate(555, 16)">
            <circle cx="0" cy="-2" r="3" fill="#ff7b72" opacity="0.8" />
            <circle cx="-2.5" cy="0.5" r="3" fill="#ff7b72" opacity="0.8" />
            <circle cx="2.5" cy="0.5" r="3" fill="#ff7b72" opacity="0.8" />
            <circle cx="0" cy="0" r="2" fill="#f1e05a" />
        </g>

        <!-- Small flower on vine lower -->
        <g transform="translate(375, 34)">
            <circle cx="0" cy="-2" r="2.5" fill="#bb86fc" opacity="0.8" />
            <circle cx="-2" cy="0.5" r="2.5" fill="#bb86fc" opacity="0.8" />
            <circle cx="2" cy="0.5" r="2.5" fill="#bb86fc" opacity="0.8" />
            <circle cx="0" cy="0" r="1.5" fill="#f1e05a" />
        </g>
    </g>
</svg>