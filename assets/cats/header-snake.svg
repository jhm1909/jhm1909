<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -5 700 85" width="700" height="85">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#00d4ff" />
            <stop offset="100%" style="stop-color:#bb86fc" />
        </linearGradient>
    </defs>
    <style>
        @keyframes tongue-flick {

            0%,
            70%,
            100% {
                transform: scaleX(1);
            }

            80% {
                transform: scaleX(0.3);
            }
        }

        @keyframes blink {

            0%,
            90%,
            92%,
            100% {
                transform: scaleY(1);
            }

            91% {
                transform: scaleY(0.1);
            }
        }

        .tongue {
            animation: tongue-flick 2s ease-in-out infinite;
            transform-origin: left center;
            transform-box: fill-box;
        }

        .sn-eyes {
            animation: blink 4s linear infinite;
            transform-origin: center;
            transform-box: fill-box;
        }
    </style>
    <!-- Header bar -->
    <rect x="30" y="20" width="640" height="40" rx="20" fill="url(#bg)" />
    <text x="340" y="46" font-family="Segoe UI,sans-serif" font-size="16" font-weight="bold" fill="white"
        text-anchor="middle" letter-spacing="2">CONTRIBUTION SNAKE</text>

    <!-- Small snake: left→right, hugs bar tightly -->
    <g>
        <!-- Body — thin, tight waves around bar edges -->
        <path d="M 20 35
            Q 35 35, 50 22
            Q 65 8, 90 8
            Q 115 8, 128 22
            Q 140 38, 155 52
            Q 170 68, 195 68
            Q 220 68, 233 52
            Q 245 38, 258 22
            Q 270 8, 295 8
            Q 310 8, 318 16" fill="none" stroke="#2ea043" stroke-width="4" stroke-linecap="round"
            stroke-linejoin="round" />

        <!-- Belly stripe -->
        <path d="M 20 35
            Q 35 35, 50 22
            Q 65 8, 90 8
            Q 115 8, 128 22
            Q 140 38, 155 52
            Q 170 68, 195 68
            Q 220 68, 233 52
            Q 245 38, 258 22
            Q 270 8, 295 8
            Q 310 8, 318 16" fill="none" stroke="#7ee787" stroke-width="1.5" stroke-linecap="round" opacity="0.4" />

        <!-- Small diamonds -->
        <g opacity="0.3">
            <polygon points="90,6 92,8 90,10 88,8" fill="#1a7f37" />
            <polygon points="155,50 157,52 155,54 153,52" fill="#1a7f37" />
            <polygon points="195,66 197,68 195,70 193,68" fill="#1a7f37" />
            <polygon points="295,6 297,8 295,10 293,8" fill="#1a7f37" />
        </g>

        <!-- Tail tip -->
        <path d="M 20 35 Q 14 37, 12 34 Q 11 32, 14 33" fill="none" stroke="#2ea043" stroke-width="2"
            stroke-linecap="round" />

        <!-- Snake head — small -->
        <g transform="translate(318, 16)">
            <ellipse cx="5" cy="0" rx="6" ry="4.5" fill="#2ea043" />
            <ellipse cx="8" cy="0.5" rx="3" ry="2.5" fill="#3fb950" />
            <g class="sn-eyes">
                <circle cx="4" cy="-2" r="2" fill="#f1e05a" />
                <circle cx="4" cy="-2" r="1" fill="#111" />
                <circle cx="3.5" cy="-2.3" r="0.4" fill="white" />
            </g>
            <circle cx="10" cy="-0.5" r="0.5" fill="#1a7f37" />
            <g class="tongue">
                <path d="M 11 0.5 L 15 -0.5 M 11 0.5 L 15 2" fill="none" stroke="#ff4444" stroke-width="0.8"
                    stroke-linecap="round" />
            </g>
        </g>
    </g>
</svg>