<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 70" width="700" height="70">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#00d4ff" />
            <stop offset="100%" style="stop-color:#bb86fc" />
        </linearGradient>
    </defs>
    <style>
        @keyframes climb {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-4px)
            }
        }

        @keyframes paw-grip {

            0%,
            100% {
                transform: rotate(0)
            }

            50% {
                transform: rotate(-5deg)
            }
        }

        @keyframes tail-climb {

            0%,
            100% {
                transform: rotate(-10deg)
            }

            50% {
                transform: rotate(10deg)
            }
        }

        .climb {
            animation: climb 2s ease-in-out infinite
        }

        .paw {
            animation: paw-grip 2s ease-in-out infinite;
            transform-origin: 655px 20px
        }

        .tail {
            animation: tail-climb 1.5s ease-in-out infinite;
            transform-origin: 655px 55px
        }
    </style>
    <rect x="30" y="20" width="640" height="40" rx="20" fill="url(#bg)" />
    <text x="340" y="46" font-family="Segoe UI,sans-serif" font-size="16" font-weight="bold" fill="white"
        text-anchor="middle" letter-spacing="2">CONTRIBUTION SNAKE</text>
    <!-- Cat climbing UP the right side of the header bar -->
    <g class="climb" transform="translate(650, 5)">
        <!-- Tail below -->
        <g class="tail">
            <path d="M 5 50 Q 15 60, 10 65 Q 7 68, 8 63" fill="none" stroke="#696969" stroke-width="4"
                stroke-linecap="round" />
        </g>
        <!-- Body vertical, climbing -->
        <ellipse cx="8" cy="35" rx="10" ry="15" fill="#696969" />
        <ellipse cx="8" cy="37" rx="7" ry="10" fill="#888" />
        <!-- Head at top -->
        <circle cx="8" cy="16" r="10" fill="#696969" />
        <polygon points="0,10 2,1 5,9" fill="#696969" />
        <polygon points="11,9 14,1 16,10" fill="#696969" />
        <polygon points="1.5,9 3,3 4.5,9" fill="#ff69b4" opacity="0.35" />
        <polygon points="12,9 13.5,3 15,9" fill="#ff69b4" opacity="0.35" />
        <!-- Eyes looking up determinedly -->
        <circle cx="4" cy="14" r="2.5" fill="#00d4ff" />
        <circle cx="12" cy="14" r="2.5" fill="#00d4ff" />
        <circle cx="4.5" cy="13.5" r="1.3" fill="#111" />
        <circle cx="12.5" cy="13.5" r="1.3" fill="#111" />
        <circle cx="3.8" cy="13" r="0.5" fill="white" />
        <circle cx="11.8" cy="13" r="0.5" fill="white" />
        <ellipse cx="8" cy="18" rx="1.2" ry="0.8" fill="#ff69b4" />
        <!-- Paws gripping bar -->
        <g class="paw">
            <ellipse cx="2" cy="22" rx="4" ry="3" fill="#696969" />
            <ellipse cx="16" cy="24" rx="4" ry="3" fill="#696969" />
        </g>
        <!-- Back paws -->
        <ellipse cx="3" cy="48" rx="4" ry="3" fill="#696969" />
        <ellipse cx="14" cy="48" rx="4" ry="3" fill="#696969" />
    </g>
    <!-- Small snake emoji the cat is eyeing 🐍 -->
    <text x="610" y="46" font-size="14">🐍</text>
</svg>