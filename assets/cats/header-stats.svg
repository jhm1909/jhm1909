<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 85" width="700" height="85">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#00d4ff" />
            <stop offset="100%" style="stop-color:#bb86fc" />
        </linearGradient>
    </defs>
    <style>
        @keyframes peek {

            0%,
            100% {
                transform: translateY(0)
            }

            30% {
                transform: translateY(-6px)
            }

            60% {
                transform: translateY(-2px)
            }
        }

        @keyframes blink {

            0%,
            85%,
            87%,
            100% {
                transform: scaleY(1)
            }

            86% {
                transform: scaleY(0.1)
            }
        }

        @keyframes paw-tap {

            0%,
            100% {
                transform: rotate(0)
            }

            50% {
                transform: rotate(-8deg)
            }
        }

        .peek {
            animation: peek 3s ease-in-out infinite
        }

        .eyes {
            animation: blink 3s linear infinite;
            transform-origin: center;
            transform-box: fill-box;
        }

        .paw-l {
            animation: paw-tap 1.5s ease-in-out infinite;
            transform-origin: 320px 20px
        }

        .bush-sway {
            animation: sway 4s ease-in-out infinite alternate;
            transform-origin: bottom center;
            transform-box: fill-box;
        }

        @keyframes sway {
            0% {
                transform: rotate(-2deg);
            }

            100% {
                transform: rotate(2deg);
            }
        }
    </style>
    <!-- Header bar -->
    <rect x="30" y="20" width="640" height="40" rx="20" fill="url(#bg)" />
    <text x="350" y="46" font-family="Segoe UI,sans-serif" font-size="16" font-weight="bold" fill="white"
        text-anchor="middle" letter-spacing="2">GITHUB ANALYTICS</text>
    <!-- Cat peeking from BEHIND the header, center-right -->
    <g class="peek" transform="translate(520, 0)">
        <!-- Head poking up from behind bar -->
        <circle cx="0" cy="16" r="12" fill="#f5f5f5" />
        <!-- Orange spot -->
        <ellipse cx="-5" cy="12" rx="5" ry="4" fill="#f4a460" opacity="0.7" />
        <!-- Ears above -->
        <polygon points="-9,8 -7,-2 -3,7" fill="#f5f5f5" />
        <polygon points="3,7 7,-2 9,8" fill="#f5f5f5" />
        <polygon points="-8,7 -7,0 -4,7" fill="#ff69b4" opacity="0.4" />
        <polygon points="4,7 7,0 8,7" fill="#ff69b4" opacity="0.4" />
        <!-- Big curious eyes peering over -->
        <g class="eyes">
            <circle cx="-4" cy="15" r="3.5" fill="#4169E1" />
            <circle cx="4" cy="15" r="3.5" fill="#4169E1" />
            <circle cx="-3.5" cy="15" r="2" fill="#111" />
            <circle cx="4.5" cy="15" r="2" fill="#111" />
            <circle cx="-4.5" cy="14" r="0.8" fill="white" />
            <circle cx="3.5" cy="14" r="0.8" fill="white" />
        </g>
        <!-- Paws gripping the bar top -->
        <g class="paw-l">
            <ellipse cx="-8" cy="21" rx="5" ry="3.5" fill="#f5f5f5" />
            <circle cx="-10" cy="22" r="1" fill="#ff69b4" opacity="0.4" />
            <circle cx="-7" cy="22.5" r="0.8" fill="#ff69b4" opacity="0.4" />
        </g>
        <circle cx="6" cy="22" r="1" fill="#ff69b4" opacity="0.4" />
        <circle cx="9" cy="22.5" r="0.8" fill="#ff69b4" opacity="0.4" />
    </g>

    <!-- Bush growing on the left side -->
    <g class="bush-sway" transform="translate(45, 10)">
        <circle cx="10" cy="30" r="15" fill="#2ea043" />
        <circle cx="25" cy="20" r="18" fill="#3fb950" />
        <circle cx="40" cy="28" r="14" fill="#2ea043" />
        <!-- Highlights -->
        <circle cx="20" cy="12" r="6" fill="#7ee787" opacity="0.6" />
        <circle cx="35" cy="22" r="5" fill="#7ee787" opacity="0.6" />
        <!-- Berries -->
        <circle cx="12" cy="25" r="2.5" fill="#ff7b72" />
        <circle cx="28" cy="15" r="2.5" fill="#ff7b72" />
        <circle cx="38" cy="32" r="2.5" fill="#ff7b72" />
    </g>
</svg>