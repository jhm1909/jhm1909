<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -20 700 100" width="700" height="100">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#00d4ff" />
            <stop offset="100%" style="stop-color:#bb86fc" />
        </linearGradient>
    </defs>
    <style>
        @keyframes tail-s {

            0%,
            100% {
                transform: rotate(-8deg)
            }

            50% {
                transform: rotate(8deg)
            }
        }

        @keyframes blink {

            0%,
            88%,
            90%,
            100% {
                transform: scaleY(1)
            }

            89% {
                transform: scaleY(0.1)
            }
        }

        @keyframes wind-sway {
            0% {
                transform: rotate(0deg)
            }

            25% {
                transform: rotate(2deg)
            }

            50% {
                transform: rotate(-2deg)
            }

            75% {
                transform: rotate(1deg)
            }

            100% {
                transform: rotate(0deg)
            }
        }

        @keyframes leaf-flutter {
            0% {
                transform: rotate(-8deg)
            }

            30% {
                transform: rotate(5deg)
            }

            60% {
                transform: rotate(-4deg)
            }

            100% {
                transform: rotate(-8deg)
            }
        }



        .eyes {
            animation: blink 3.5s linear infinite;
            transform-origin: center;
            transform-box: fill-box;
        }

        .flower-sway {
            animation: wind-sway 5s ease-in-out infinite;
            transform-origin: 640px 62px;
        }

        .leaf-sway {
            animation: leaf-flutter 3.5s ease-in-out infinite;
            transform-box: fill-box;
            transform-origin: bottom left;
        }
    </style>

    <!-- Header bar -->
    <rect x="30" y="20" width="640" height="40" rx="20" fill="url(#bg)" />
    <text x="350" y="46" font-family="Segoe UI,sans-serif" font-size="16" font-weight="bold" fill="white"
        text-anchor="middle" letter-spacing="2">TECH ARSENAL</text>

    <!-- Cat sitting ON TOP of header, left side -->
    <g transform="translate(55, -2)">
        <!-- Tail — static, starts inside body -->
        <path d="M 74 10 Q 85 0, 90 5 Q 93 10, 88 7" fill="none" stroke="#2c2c2c" stroke-width="4"
            stroke-linecap="round" />
        <!-- Body sitting -->
        <ellipse cx="65" cy="12" rx="14" ry="10" fill="#2c2c2c" />
        <ellipse cx="65" cy="14" rx="9" ry="6" fill="#444" />
        <!-- Head -->
        <circle cx="55" cy="3" r="10" fill="#2c2c2c" />
        <!-- Ears -->
        <polygon points="47,-4 49,-13 53,-3" fill="#2c2c2c" />
        <polygon points="57,-3 61,-13 63,-4" fill="#2c2c2c" />
        <polygon points="48,-3 50,-11 52,-3" fill="#ff69b4" opacity="0.35" />
        <polygon points="58,-3 60,-11 62,-3" fill="#ff69b4" opacity="0.35" />
        <!-- Eyes -->
        <g class="eyes">
            <circle cx="51" cy="2" r="2.8" fill="#ffd700" />
            <circle cx="59" cy="2" r="2.8" fill="#ffd700" />
            <circle cx="51.5" cy="2" r="1.5" fill="#111" />
            <circle cx="59.5" cy="2" r="1.5" fill="#111" />
            <circle cx="50.5" cy="1" r="0.6" fill="white" />
            <circle cx="58.5" cy="1" r="0.6" fill="white" />
        </g>
        <!-- Nose -->
        <ellipse cx="55" cy="6" rx="1.5" ry="1" fill="#ff69b4" />
        <!-- Paws resting on bar — bigger -->
        <ellipse cx="52" cy="21" rx="7" ry="4" fill="#2c2c2c" />
        <ellipse cx="72" cy="21" rx="7" ry="4" fill="#2c2c2c" />
    </g>

    <!-- Flower on right side — CORAL/PINK color to contrast with cyan-purple gradient -->
    <g class="flower-sway">
        <!-- Stem -->
        <path d="M 640 60 Q 642 50 640 35" fill="none" stroke="#2ea043" stroke-width="3" stroke-linecap="round" />
        <!-- Petals — warm coral/salmon, clearly distinct from the gradient -->
        <circle cx="640" cy="28" r="7" fill="#ff6b6b" />
        <circle cx="633" cy="33" r="7" fill="#ff8787" />
        <circle cx="647" cy="33" r="7" fill="#ff8787" />
        <circle cx="636" cy="39" r="6" fill="#ff6b6b" />
        <circle cx="644" cy="39" r="6" fill="#ff6b6b" />
        <!-- Center -->
        <circle cx="640" cy="34" r="5" fill="#ffd43b" />
        <!-- Leaf 1 on stem -->
        <g class="leaf-sway">
            <path d="M 640 50 Q 650 44 656 52 Q 648 55 640 50 Z" fill="#3fb950" />
        </g>
        <!-- Leaf 2 on stem -->
        <g class="leaf-sway" style="animation-delay: 0.5s;">
            <path d="M 640 42 Q 628 36 624 44 Q 632 48 640 42 Z" fill="#7ee787" />
        </g>
        <!-- Leaf 3 — small one near base -->
        <g class="leaf-sway" style="animation-delay: 1s;">
            <path d="M 640 56 Q 630 52 627 58 Q 633 62 640 56 Z" fill="#3fb950" />
        </g>
    </g>
</svg>