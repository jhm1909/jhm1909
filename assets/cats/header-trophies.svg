<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 68" width="700" height="68">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#00d4ff" />
            <stop offset="100%" style="stop-color:#bb86fc" />
        </linearGradient>
    </defs>
    <style>
        @keyframes reach {

            0%,
            100% {
                transform: rotate(0)
            }

            40% {
                transform: rotate(-15deg)
            }

            70% {
                transform: rotate(5deg)
            }
        }

        @keyframes tail {

            0%,
            100% {
                transform: rotate(0)
            }

            50% {
                transform: rotate(10deg)
            }
        }

        @keyframes blink {

            0%,
            92%,
            94%,
            100% {
                transform: scaleY(1)
            }

            93% {
                transform: scaleY(0.1)
            }
        }

        .paw {
            animation: reach 2s ease-in-out infinite;
            transform-origin: 60px 30px
        }

        .tail {
            animation: tail 2s ease-in-out infinite;
            transform-origin: 42px 28px
        }

        .eyes {
            animation: blink 4s linear infinite;
            transform-origin: center
        }
    </style>
    <rect x="30" y="20" width="640" height="40" rx="20" fill="url(#bg)" />
    <text x="350" y="46" font-family="Segoe UI,sans-serif" font-size="16" font-weight="bold" fill="white"
        text-anchor="middle" letter-spacing="2">GITHUB TROPHIES</text>
    <!-- Cat reaching for a trophy from left side -->
    <g transform="translate(20, 0)">
        <g class="tail">
            <path d="M 42 28 Q 25 15, 18 25 Q 15 30, 20 27" fill="none" stroke="#808080" stroke-width="4"
                stroke-linecap="round" />
        </g>
        <ellipse cx="52" cy="30" rx="14" ry="11" fill="#808080" />
        <ellipse cx="52" cy="32" rx="9" ry="7" fill="#a9a9a9" />
        <circle cx="52" cy="16" r="10" fill="#808080" />
        <polygon points="44,10 46,1 49,9" fill="#808080" />
        <polygon points="55,9 58,1 60,10" fill="#808080" />
        <polygon points="45,9 47,3 48,9" fill="#ff69b4" opacity="0.35" />
        <polygon points="56,9 58,3 59,9" fill="#ff69b4" opacity="0.35" />
        <g class="eyes">
            <circle cx="48" cy="15" r="2.5" fill="#ffd700" />
            <circle cx="56" cy="15" r="2.5" fill="#ffd700" />
            <circle cx="48.5" cy="15" r="1.4" fill="#111" />
            <circle cx="56.5" cy="15" r="1.4" fill="#111" />
        </g>
        <ellipse cx="52" cy="19" rx="1.3" ry="0.9" fill="#ff69b4" />
        <!-- Reaching paw toward trophy emoji on header -->
        <g class="paw">
            <path d="M 60 30 Q 72 24, 78 20" fill="none" stroke="#808080" stroke-width="5" stroke-linecap="round" />
            <ellipse cx="80" cy="19" rx="4" ry="3" fill="#808080" />
        </g>
        <ellipse cx="42" cy="39" rx="5" ry="3" fill="#808080" />
        <ellipse cx="58" cy="39" rx="5" ry="3" fill="#808080" />
        <!-- Small trophy the cat is reaching for -->
        <text x="88" y="24" font-size="14">🏆</text>
    </g>
</svg>